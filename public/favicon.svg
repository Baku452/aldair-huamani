<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .cup    { fill: #a07850; }
    .handle { fill: none; stroke: #a07850; stroke-width: 9; stroke-linecap: round; }
    .steam  { fill: none; stroke: #a07850; stroke-width: 4.5; stroke-linecap: round; }
    .foam   { fill: #e8d5be; }
    .matcha { fill: #4a7c59; }
    @media (prefers-color-scheme: dark) {
      .cup    { fill: #c9a07a; }
      .handle { stroke: #c9a07a; }
      .steam  { stroke: #c9a07a; }
      .foam   { fill: #f0e0c8; }
      .matcha { fill: #6aaa80; }
    }
  </style>

  <!-- Steam -->
  <path class="steam" d="M46 28 Q42 20 46 12"/>
  <path class="steam" d="M64 28 Q60 20 64 12"/>
  <path class="steam" d="M82 28 Q78 20 82 12"/>

  <!-- Cup body -->
  <path class="cup" d="M26 40 L34 102 Q35 110 44 110 L84 110 Q93 110 94 102 L102 40 Z"/>

  <!-- Handle -->
  <path class="handle" d="M102 55 Q122 55 122 72 Q122 89 102 89"/>

  <!-- Foam surface -->
  <ellipse class="foam" cx="64" cy="42" rx="38" ry="10"/>

  <!-- Matcha latte art -->
  <ellipse class="matcha" cx="64" cy="42" rx="14" ry="5"/>
</svg>
